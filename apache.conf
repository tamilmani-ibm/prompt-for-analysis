########################################################
# 10-reverse-proxy.conf  (rendered at container startup by entrypoint.sh)
# Sample rendering with APP_UPSTREAM=http://app-svc:8080
########################################################

ProxyRequests Off
ProxyPreserveHost On
SSLProxyEngine On

# ---------- FRONTEND MODULE (authenticated) ----------
<Location /frontend>
    PingAccessAgentEnable On

    ProxyPass        "http://app-svc:8080/frontend"
    ProxyPassReverse "http://app-svc:8080/frontend"

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
</Location>

# ---------- BACKEND MODULE (proxy only, no auth) ----------
<Location /backend>
    PingAccessAgentEnable Off

    ProxyPass        "http://app-svc:8080/backend"
    ProxyPassReverse "http://app-svc:8080/backend"

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
</Location>

# ---------- Health check for OpenShift liveness/readiness probes ----------
<Location /healthz>
    PingAccessAgentEnable Off
    SetHandler server-status
    Require all granted
</Location>
